version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://clawdagent:clawdagent@postgres:5432/clawdagent
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    networks:
      - clawdnet

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawdagent
      POSTGRES_PASSWORD: clawdagent
      POSTGRES_DB: clawdagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - clawdnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - clawdnet
    restart: unless-stopped

networks:
  clawdnet:
    driver: bridge

volumes:
  pgdata:
  redisdata:
